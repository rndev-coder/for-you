 <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for youu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* 🌌 AURORA */
body{
    background: radial-gradient(circle at top, #ff4fd8 0%, transparent 40%),
                radial-gradient(circle at bottom left, #7c3aed 0%, transparent 45%),
                radial-gradient(circle at bottom right, #00d4ff 0%, transparent 45%),
                linear-gradient(120deg, #0b0f1a, #1a0b2e, #0b0f1a);
    background-size: 200% 200%;
    animation: auroraMove 8s ease-in-out infinite;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

@keyframes auroraMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 💌 BOX */
.kotak{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

/* BUTTON */
.btn-wrap{
    margin-top:25px;
    position:relative;
    height:140px;
}

.btn{
    padding:10px 18px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    position:absolute;
}

.btn.yes{
    left:20px;
    background:#ff4fd8;
    color:white;
    box-shadow:0 0 15px #ff4fd8;
}

.btn.no{
    right:20px;
    background:#0b84ff;
    color:white;
    box-shadow:0 0 15px #0b84ff;
}

/* 💌 CHAT BUTTON */
#chatBtn{
    display:none;
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    color:white;
    font-weight:bold;

    background: linear-gradient(120deg, #ff4fd8, #7c3aed, #00d4ff);
    background-size:300% 300%;
    animation: chatGlow 5s ease infinite;

    box-shadow:0 0 20px rgba(255,79,216,0.5),
                0 0 40px rgba(124,58,237,0.3);
}

@keyframes chatGlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* CHAT */
#surat{
    display:none;
    margin-top:20px;
    text-align:left;
    max-height:60vh;
    overflow-y:auto;
    padding:12px;
    background:rgba(0,0,0,.25);
    border-radius:16px;

    display:flex;
    flex-direction:column;
    gap:8px;
}

/* 💬 BUBBLE */
.bubble{
    max-width:75%;
    width:fit-content;
    padding:12px 14px;
    margin:8px 0;
    border-radius:16px;
    color:white;
    line-height:1.4;
    word-wrap:break-word;
    white-space:pre-wrap;

    background: linear-gradient(120deg, #ff4fd8, #7c3aed, #00d4ff);
    background-size:300% 300%;
    animation: bubbleFlow 6s ease infinite;

    box-shadow: 0 4px 20px rgba(255,79,216,0.25);
}

@keyframes bubbleFlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.typing{
    opacity:0.7;
    padding:8px;
}

/* 💧 TEAR */
.tear{
    position:fixed;
    font-size:16px;
    animation:tearFall 1.8s linear forwards;
    pointer-events:none;
}

@keyframes tearFall{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(120vh);opacity:0;}
}

</style>
</head>

<body>

<div class="kotak">

<h1>bukaa yaa</h1>
<p>kamu sayang aku ga🗿</p>

<div class="btn-wrap">
    <button class="btn yes" onclick="ya()">ya 💖</button>
    <button class="btn no" id="btnNo">ga🖕</button>
</div>

<button id="chatBtn" onclick="chat()">💌 buka chat</button>

<div id="surat">
    <div id="teks"></div>
</div>

</div>

 <audio id="bgm" autoplay loop>
    <source src="mix1.mp3" type="audio/mpeg">
</audio>

<script>

/* 💬 TEXT KAMU (FIXED) */
const isiChat = [
`akuu cuman mauu minta maapp buat semua hal yang pernah bikin kamuu capee,kecewa,marah
aku sadar dulu akuu terlalu posesif,ga peka, liatin wa kamu tampa izin maapp kaloo ituu bikinn kamu ngga nyaman, jujur waktu itu aku ngelakuin semua itu karena aku terlalu takut kehilangan kamu. tapi itu tetep salah akuu, aku cintaa bangett sama kamuu meysaa maaff kalo akuu berlebihan, aku nyesel banget aku baru sadar pas semuanya udahh berakhir`,

`sampe sekarang akuu masih cinta sama kamuu yaa walaupun kita gapernah ketemu tapi itu bnran aku ga bohong,em kalo sekarang kamu lagi ngga suka siapa² aku gamau maksa perasaan kamu buat suka sama aku lagi, ya walaupun itu mustahil kalo kamu suka sama aku lagi, tapi boleh kan kalo aku nunggu kamu? aku gaada pilihan lain dn gapernah ada, sampe sekarang perasaan aku ke kamu masih ada,maaff yaa`,

`aku nyesel banget udah kayak gitu sama kamu kalo aja aku dengerin kata jian,dia udah bilangin aku jgn terlalu posesif sama kamu aku malah ga dengerin dia,sekarang aku nyesel banget kalo aku dengerin kta dia mngkin hub kita baik baik aja sampe skrng, maafin akuu aku yang salah andai aku bisa perbaiki semuanya aku gabakal kyk gitu lagi, aku nyesel banget aku pengen perbaiki semuanya.`,

`jangan blok nomor aku yaa. tenang aja, aku ngga bakal chat berlebihan atau ganggu kamu kok. kalo emang kamu ngga mau liat chat aku kamu arsip aja gapapa.`,

`sekali lagi maaff yaa buat semuanya, dan makasii karena pernah jadi bagian paling berarti di hidup aku  🤍`,

`oh iyaa, dan dengan siapapun kamuu nantinya, ya jangan lah anjir harus sama aku 😭canda wkwk`,

`tapi kalo misalnya emang takdirnya balik lagi ke aku, ya akuu gaa bakal nolak sih, i will always love you`,

`aku bikin web ini biar ga spam kamu di wa hehe.`

];

let btnNo=document.getElementById("btnNo");
let noCount=0;

/* 💖 YES */
function ya(){
    document.querySelector(".btn-wrap").style.display="none";
    document.getElementById("chatBtn").style.display="inline-block";

    let music=document.getElementById("bgm");
    music.volume=0.8;
    music.play().catch(()=>{});
}

/* 💀 GA🖕 FIX */
btnNo.addEventListener("click", kabur);

function kabur(){
    noCount++;

    let x=Math.random()*(window.innerWidth-120);
    let y=Math.random()*(window.innerHeight-120);

    btnNo.style.position="fixed";
    btnNo.style.left=x+"px";
    btnNo.style.top=y+"px";

    btnNo.innerText="ga🖕";

    btnNo.style.transform=`scale(${1-noCount*0.05})`;

    spawnTear();

    if(noCount>=10){
        btnNo.style.opacity="0";
        setTimeout(()=>btnNo.remove(),800);
    }
}

/* 💧 */
function spawnTear(){
    let t=document.createElement("div");
    t.className="tear";
    t.innerHTML="💧";
    t.style.left=Math.random()*window.innerWidth+"px";
    t.style.top="-20px";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1800);
}

/* 💬 CHAT */
function chat(){
    document.getElementById("surat").style.display="block";

    let box=document.getElementById("teks");
    box.innerHTML="";
    let i=0;

    function next(){
        if(i>=isiChat.length) return;

        let typing=document.createElement("div");
        typing.className="typing";
        typing.innerText="typing...";
        box.appendChild(typing);

        setTimeout(()=>{
            typing.remove();

            let b=document.createElement("div");
            b.className="bubble";
            box.appendChild(b);

            let t=isiChat[i];
            let j=0;

            let type=setInterval(()=>{
                if(j<t.length){
                    b.innerHTML+=t[j];
                    j++;
                }else{
                    clearInterval(type);
                    i++;
                    setTimeout(next,700);
                }
            },40);
        },600);
    }

    next();
}

</script>

</body>
</html>
